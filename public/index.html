<!doctype html>
<html lang="en" class="future-dark">
  <head>
    <meta charset="utf-8" />
    <title>draw·app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Apollo "Future" foundation — zinc surfaces + cyan brand, Inter type. */
      :root {
        --surface: #09090b;
        --surface-raised: #18181b;
        --border: #27272a;
        --foreground: #fafafa;
        --foreground-muted: #a1a1aa;
        --brand: #0891b2;
        --brand-hover: #22d3ee;
      }
      * { box-sizing: border-box; }
      body {
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        letter-spacing: -0.4px;
        background: var(--surface);
        color: var(--foreground);
        margin: 0;
        min-height: 100vh;
        padding: 40px;
      }
      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        width: 800px;
        max-width: 100%;
        margin: 0 auto 20px;
      }
      h1 {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.8px;
        margin: 0;
      }
      h1 .accent { color: var(--brand-hover); }
      .subtitle {
        color: var(--foreground-muted);
        font-size: 14px;
        letter-spacing: -0.35px;
        margin-top: 4px;
      }
      button#add-note {
        font: inherit;
        font-weight: 500;
        letter-spacing: -0.35px;
        background: var(--brand);
        color: #fafafa;
        border: none;
        border-radius: 8px;
        padding: 9px 16px;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease;
      }
      button#add-note:hover { background: var(--brand-hover); color: #09090b; }
      #board {
        position: relative;
        width: 800px;
        max-width: 100%;
        margin: 0 auto;
        background-color: var(--surface-raised);
        /* subtle grid behind the canvas */
        background-image:
          linear-gradient(to right, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 24px 24px;
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0px 4px 24px 0px rgba(0, 0, 0, 0.25);
        overflow: hidden;
      }
      #c {
        display: block;
        cursor: crosshair;
        box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.35);
      }
      .note {
        position: absolute;
        max-width: 160px;
        padding: 10px 12px;
        background: #ffd400;
        color: #09090b;
        border-radius: 4px;
        box-shadow: 0px 4px 16px 0px rgba(0, 0, 0, 0.35);
        font-size: 14px;
        letter-spacing: -0.3px;
        transform: rotate(-2deg);
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>draw<span class="accent">·</span>app</h1>
        <div class="subtitle">a tiny canvas — demo sandbox for stacked PRs</div>
      </div>
      <button id="add-note">+ Add note</button>
    </header>
    <div id="board">
      <canvas id="c" width="800" height="500"></canvas>
    </div>
    <script type="module" src="/app.js"></script>
    <script type="module" src="/notes-ui.js"></script>
  </body>
</html>
